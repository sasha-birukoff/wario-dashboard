<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wario Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="topbar">
    <h1>Wario Dashboard</h1>
    <button id="themeToggle" aria-label="Toggle dark mode">🌙</button>
  </header>

  <main class="grid">
    <!-- Cron Health -->
    <section class="card" id="cronHealth">
      <h2>Cron Health</h2>
      <div class="loading">Loading...</div>
    </section>

    <!-- Dispatcher Queue -->
    <section class="card" id="queueStatus">
      <h2>Queue</h2>
      <div class="loading">Loading...</div>
    </section>

    <!-- Recent Logs -->
    <section class="card logview">
      <h2>Logs</h2>
      <div class="loading">Loading...</div>
    </section>

    <!-- System Info -->
    <section class="card" id="systemInfo">
      <h2>System</h2>
      <div class="loading">Loading...</div>
    </section>
  </main>

  <footer>
    <small>Data: localhost only | Refresh: <span id="lastUpdate">–</span></small>
  </footer>

  <script src="app.js"></script>
</body>
</html>
