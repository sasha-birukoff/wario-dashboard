<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wario Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <span class="icon">👑</span>
      <h1>Wario</h1>
      <span class="subtitle">Life Agent</span>
    </div>
    <button id="themeToggle" aria-label="Toggle dark mode">🌙</button>
  </header>

  <main class="container">
    <!-- Stats row -->
    <section class="stats-row" id="statsRow">
      <div class="stat-card">
        <div class="stat-label">Cron Health</div>
        <div class="stat-value" id="statCron">–</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Dispatcher TODO</div>
        <div class="stat-value" id="statQueue">–</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Git Commits Today</div>
        <div class="stat-value" id="statCommits">–</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Memory Files</div>
        <div class="stat-value" id="statMemory">–</div>
      </div>
    </section>

    <!-- Quick Actions -->
    <section class="actions-row">
      <button onclick="runCmd('memory_sync')">Sync Memory</button>
      <button onclick="runCmd('daily_digest')">Send Daily Digest</button>
      <button onclick="runCmd('restart_dispatcher')">Restart Dispatcher</button>
      <button onclick="openLogs()">Open Logs</button>
    </section>

    <!-- Two-column content -->
    <div class="grid-2col">
      <!-- Dispatcher Queue -->
      <section class="panel">
        <h2>Dispatcher Queue</h2>
        <div id="queueContent" class="list-content">Loading…</div>
      </section>

      <!-- Cron Health -->
      <section class="panel">
        <h2>Cron Health</h2>
        <div id="cronContent" class="list-content">Loading…</div>
      </section>
    </div>

    <!-- To-Do List from MEMORY (todo tag) -->
    <section class="panel">
      <h2>To‑Do List</h2>
      <div id="todoContent" class="list-content">Loading…</div>
    </section>
  </main>

  <footer>
    <small>Last update: <span id="lastUpdate">–</span></small>
  </footer>

  <script src="app.js"></script>
</body>
</html>
